<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪小怪兽 - 毛绒球游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', '微软雅黑', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        
        h1 {
            color: #6a5acd;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 10px;
        }
        
        .instructions {
            color: #555;
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .jars-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .jar {
            width: 150px;
            height: 200px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
        }
        
        .jar.active {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
        
        .jar-top {
            width: 120px;
            height: 30px;
            border-radius: 10px 10px 0 0;
            position: relative;
            z-index: 2;
        }
        
        .jar-body {
            width: 100px;
            height: 170px;
            border-radius: 0 0 10px 10px;
            position: relative;
            overflow: hidden;
            border: 3px solid #ddd;
            border-top: none;
            background: rgba(255, 255, 255, 0.7);
        }
        
        .jar-label {
            margin-top: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .balls-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .ball {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
            position: relative;
            z-index: 10;
        }
        
        .ball:hover {
            transform: scale(1.1);
        }
        
        .ball:active {
            cursor: grabbing;
        }
        
        .ball.happy { background: radial-gradient(circle at 30% 30%, #ffff00, #ffd700); }
        .ball.sad { background: radial-gradient(circle at 30% 30%, #1e90ff, #0000cd); }
        .ball.angry { background: radial-gradient(circle at 30% 30%, #ff4500, #b22222); }
        .ball.calm { background: radial-gradient(circle at 30% 30%, #32cd32, #228b22); }
        .ball.afraid { background: radial-gradient(circle at 30% 30%, #a9a9a9, #696969); }
        .ball.love { background: radial-gradient(circle at 30% 30%, #ff69b4, #ff1493); }
        
        .feedback-container {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 25px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-top: 20px;
            transition: background-color 0.5s;
        }
        
        .feedback-title {
            color: #6a5acd;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        
        .feedback-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .feedback-text {
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.5s;
        }
        
        .emoji {
            font-size: 3rem;
            margin: 0 10px;
            animation: bounce 1s infinite alternate;
        }
        
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        
        .suggestion {
            font-size: 1.3rem;
            color: #555;
            font-style: italic;
            background: rgba(255, 255, 240, 0.7);
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            transition: all 0.5s;
        }
        
        .reset-btn {
            background: #6a5acd;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(106, 90, 205, 0.3);
        }
        
        .reset-btn:hover {
            background: #7b68ee;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(106, 90, 205, 0.4);
        }
        
        .jar .ball-in-jar {
            position: absolute;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            z-index: 1;
            transition: transform 0.3s;
        }
        
        /* 情绪罐子颜色 */
        .happy .jar-top, .happy .jar-body { background: rgba(255, 255, 0, 0.15); }
        .sad .jar-top, .sad .jar-body { background: rgba(30, 144, 255, 0.15); }
        .angry .jar-top, .angry .jar-body { background: rgba(255, 69, 0, 0.15); }
        .calm .jar-top, .calm .jar-body { background: rgba(50, 205, 50, 0.15); }
        .afraid .jar-top, .afraid .jar-body { background: rgba(169, 169, 169, 0.15); }
        .love .jar-top, .love .jar-body { background: rgba(255, 105, 180, 0.15); }
        
        /* 情绪反馈背景色 */
        .feedback-happy { background: rgba(255, 255, 0, 0.1); }
        .feedback-sad { background: rgba(30, 144, 255, 0.1); }
        .feedback-angry { background: rgba(255, 69, 0, 0.1); }
        .feedback-calm { background: rgba(50, 205, 50, 0.1); }
        .feedback-afraid { background: rgba(169, 169, 169, 0.1); }
        .feedback-love { background: rgba(255, 105, 180, 0.1); }
        
        /* 情绪文字颜色 */
        .text-happy { color: #b8860b; }
        .text-sad { color: #1e90ff; }
        .text-angry { color: #b22222; }
        .text-calm { color: #228b22; }
        .text-afraid { color: #696969; }
        .text-love { color: #ff1493; }
        
        .level-indicator {
            display: flex;
            justify-content: center;
            margin-top: 10px;
            gap: 5px;
        }
        
        .level-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
        }
        
        .level-dot.active {
            background: #6a5acd;
        }
        
        @media (max-width: 768px) {
            .jars-container, .balls-container {
                gap: 15px;
            }
            
            .jar {
                width: 120px;
                height: 180px;
            }
            
            .ball {
                width: 50px;
                height: 50px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .feedback-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>情绪小怪兽毛绒球游戏</h1>
        <p class="instructions">请根据你现在的情绪状态，将对应颜色的毛绒球拖放到情绪罐子里。每个罐子里的球越多，代表这种情绪越强烈。</p>
    </div>
    
    <div class="game-container">
        <div class="jars-container">
            <!-- 情绪罐子将通过JS生成 -->
        </div>
        
        <div class="balls-container">
            <!-- 毛绒球将通过JS生成 -->
        </div>
    </div>
    
    <div class="feedback-container" id="feedbackContainer">
        <div class="feedback-title">你的情绪状态</div>
        <div class="feedback-content">
            <div class="feedback-text" id="feedbackText">请开始拖放毛绒球来表达你的情绪</div>
            <div class="suggestion" id="suggestionText">根据你放入的情绪小球，这里会提供相应的建议</div>
            <div class="level-indicator" id="levelIndicator"></div>
        </div>
    </div>
    
    <button class="reset-btn">重置游戏</button>
    
    <script>
        // 情绪数据配置
        const emotions = [
            { id: 'happy', name: '快乐', color: 'yellow', emoji: '😄', jarColor: '#ffff00' },
            { id: 'sad', name: '忧伤', color: 'blue', emoji: '😢', jarColor: '#1e90ff' },
            { id: 'angry', name: '愤怒', color: 'red', emoji: '😠', jarColor: '#ff4500' },
            { id: 'calm', name: '平静', color: 'green', emoji: '😌', jarColor: '#32cd32' },
            { id: 'afraid', name: '害怕', color: 'gray', emoji: '😨', jarColor: '#a9a9a9' },
            { id: 'love', name: '喜欢', color: 'pink', emoji: '😍', jarColor: '#ff69b4' }
        ];
        
        // 情绪反馈配置（按级别）
        const feedback = {
            happy: {
                1: { text: "你有一点点开心", suggestion: "保持微笑，快乐会传染哦！" },
                2: { text: "你现在挺快乐的", suggestion: "分享你的快乐给身边的人吧！" },
                3: { text: "你非常快乐！", suggestion: "快乐是最棒的情绪，享受这一刻！" },
                4: { text: "你简直快乐到飞起！", suggestion: "把你的快乐传递给更多人吧！" }
            },
            sad: {
                1: { text: "你有一点点忧伤", suggestion: "和朋友聊聊可能会感觉好些" },
                2: { text: "你现在挺忧伤的", suggestion: "试着做些喜欢的事转移注意力" },
                3: { text: "你非常忧伤", suggestion: "给自己一点时间，情绪会过去的" },
                4: { text: "你沉浸在忧伤中", suggestion: "和信任的人谈谈你的感受吧" }
            },
            angry: {
                1: { text: "你有一点点生气", suggestion: "深呼吸几次，冷静一下" },
                2: { text: "你现在挺生气的", suggestion: "试着离开当前环境冷静一下" },
                3: { text: "你非常愤怒！", suggestion: "尝试用运动释放愤怒情绪" },
                4: { text: "你简直怒火中烧！", suggestion: "先冷静下来再解决问题" }
            },
            calm: {
                1: { text: "你有一点点平静", suggestion: "保持内心的平和很重要" },
                2: { text: "你现在挺平静的", suggestion: "平静的心态有助于思考" },
                3: { text: "你非常平静", suggestion: "享受内心的宁静时刻" },
                4: { text: "你心如止水", suggestion: "平静是强大的力量" }
            },
            afraid: {
                1: { text: "你有一点点害怕", suggestion: "害怕是正常的，慢慢来" },
                2: { text: "你现在挺害怕的", suggestion: "试着找出害怕的原因" },
                3: { text: "你非常害怕", suggestion: "寻求信任的人的帮助和支持" },
                4: { text: "你感到极度恐惧", suggestion: "记住恐惧只是暂时的感受" }
            },
            love: {
                1: { text: "你有一点点喜欢", suggestion: "喜欢的感觉很美好" },
                2: { text: "你现在挺喜欢的", suggestion: "享受喜欢带来的快乐" },
                3: { text: "你非常喜欢！", suggestion: "把这份喜欢分享给他人" },
                4: { text: "你简直爱不释手！", suggestion: "热爱是生活的动力源泉" }
            }
        };
        
        // 游戏状态
        const gameState = {
            counts: {
                happy: 0,
                sad: 0,
                angry: 0,
                calm: 0,
                afraid: 0,
                love: 0
            },
            currentDragging: null,
            lastEmotion: null
        };
        
        // 初始化游戏
        function initGame() {
            const jarsContainer = document.querySelector('.jars-container');
            const ballsContainer = document.querySelector('.balls-container');
            
            // 创建情绪罐子
            emotions.forEach(emotion => {
                const jar = document.createElement('div');
                jar.className = `jar ${emotion.id}`;
                jar.dataset.emotion = emotion.id;
                
                jar.innerHTML = `
                    <div class="jar-top" style="background: ${emotion.jarColor}"></div>
                    <div class="jar-body" id="jar-${emotion.id}"></div>
                    <div class="jar-label">${emotion.name}</div>
                `;
                
                jar.addEventListener('dragover', handleDragOver);
                jar.addEventListener('drop', handleDrop);
                
                jarsContainer.appendChild(jar);
            });
            
            // 创建毛绒球
            emotions.forEach(emotion => {
                const ball = document.createElement('div');
                ball.className = `ball ${emotion.id}`;
                ball.dataset.emotion = emotion.id;
                ball.draggable = true;
                ball.innerHTML = emotion.emoji;
                
                ball.addEventListener('dragstart', handleDragStart);
                
                ballsContainer.appendChild(ball);
            });
            
            // 重置按钮事件
            document.querySelector('.reset-btn').addEventListener('click', resetGame);
            
            // 初始反馈
            updateFeedback();
        }
        
        // 拖拽开始
        function handleDragStart(e) {
            gameState.currentDragging = e.target.dataset.emotion;
            e.dataTransfer.setData('text/plain', e.target.dataset.emotion);
        }
        
        // 拖拽经过
        function handleDragOver(e) {
            e.preventDefault();
        }
        
        // 放置处理
        function handleDrop(e) {
            e.preventDefault();
            const emotionId = gameState.currentDragging;
            const jarId = e.currentTarget.dataset.emotion;
            
            // 只能放入对应情绪的罐子
            if (emotionId === jarId) {
                gameState.counts[emotionId]++;
                gameState.lastEmotion = emotionId; // 记录最后操作的情绪
                addBallToJar(emotionId);
                updateFeedback();
                
                // 添加罐子激活效果
                const jars = document.querySelectorAll('.jar');
                jars.forEach(jar => jar.classList.remove('active'));
                e.currentTarget.classList.add('active');
                
                // 3秒后移除激活效果
                setTimeout(() => {
                    e.currentTarget.classList.remove('active');
                }, 2000);
            }
        }
        
        // 添加小球到罐子
        function addBallToJar(emotionId) {
            const jarBody = document.getElementById(`jar-${emotionId}`);
            const ball = document.createElement('div');
            ball.className = 'ball-in-jar';
            
            // 设置小球颜色
            const emotion = emotions.find(e => e.id === emotionId);
            ball.style.background = `radial-gradient(circle at 30% 30%, ${emotion.jarColor}, ${adjustColor(emotion.jarColor, -50)})`;
            
            // 随机位置（模拟堆叠效果）
            const maxX = jarBody.clientWidth - 30;
            const maxY = jarBody.clientHeight - 30;
            
            const x = Math.floor(Math.random() * maxX);
            const y = jarBody.clientHeight - 30 - (gameState.counts[emotionId] * 5);
            
            ball.style.left = `${x}px`;
            ball.style.bottom = `${y}px`;
            
            jarBody.appendChild(ball);
            
            // 添加小球动画
            ball.style.transform = 'scale(0)';
            setTimeout(() => {
                ball.style.transform = 'scale(1)';
                ball.style.transition = 'transform 0.3s ease-out';
            }, 10);
        }
        
        // 更新反馈信息（根据最后操作的情绪和球的数量）
        function updateFeedback() {
            const feedbackContainer = document.getElementById('feedbackContainer');
            const feedbackText = document.getElementById('feedbackText');
            const suggestionText = document.getElementById('suggestionText');
            const levelIndicator = document.getElementById('levelIndicator');
            
            if (!gameState.lastEmotion) {
                feedbackText.innerHTML = '请开始拖放毛绒球来表达你的情绪';
                suggestionText.textContent = '根据你放入的情绪小球，这里会提供相应的建议';
                feedbackContainer.className = 'feedback-container';
                feedbackText.className = 'feedback-text';
                levelIndicator.innerHTML = '';
                return;
            }
            
            const emotionId = gameState.lastEmotion;
            const count = gameState.counts[emotionId];
            const emotionData = emotions.find(e => e.id === emotionId);
            
            // 确定反馈级别
            let level;
            if (count === 0) {
                // 0个球时不显示反馈
                feedbackText.innerHTML = '请开始拖放毛绒球来表达你的情绪';
                suggestionText.textContent = '根据你放入的情绪小球，这里会提供相应的建议';
                feedbackContainer.className = 'feedback-container';
                feedbackText.className = 'feedback-text';
                levelIndicator.innerHTML = '';
                return;
            } else if (count <= 2) {
                level = 1;
            } else if (count <= 5) {
                level = 2;
            } else if (count <= 8) {
                level = 3;
            } else {
                level = 4;
            }
            
            // 获取反馈文本
            const feedbackData = feedback[emotionId][level];
            
            // 更新反馈
            feedbackText.innerHTML = `
                ${feedbackData.text} 
                <span class="emoji">${emotionData.emoji}</span>
            `;
            suggestionText.textContent = feedbackData.suggestion;
            
            // 更新样式
            feedbackContainer.className = `feedback-container feedback-${emotionId}`;
            feedbackText.className = `feedback-text text-${emotionId}`;
            
            // 更新级别指示器
            levelIndicator.innerHTML = '';
            for (let i = 1; i <= 4; i++) {
                const dot = document.createElement('div');
                dot.className = `level-dot ${i <= level ? 'active' : ''}`;
                levelIndicator.appendChild(dot);
            }
        }
        
        // 重置游戏
        function resetGame() {
            // 重置计数
            for (const emotion in gameState.counts) {
                gameState.counts[emotion] = 0;
            }
            
            gameState.lastEmotion = null;
            
            // 清空罐子里的小球
            emotions.forEach(emotion => {
                const jarBody = document.getElementById(`jar-${emotion.id}`);
                jarBody.innerHTML = '';
            });
            
            // 更新反馈
            updateFeedback();
        }
        
        // 辅助函数：调整颜色亮度
        function adjustColor(color, amount) {
            let usePound = false;
            
            if (color[0] === "#") {
                color = color.slice(1);
                usePound = true;
            }
            
            const num = parseInt(color, 16);
            let r = (num >> 16) + amount;
            if (r > 255) r = 255;
            else if (r < 0) r = 0;
            
            let b = ((num >> 8) & 0x00FF) + amount;
            if (b > 255) b = 255;
            else if (b < 0) b = 0;
            
            let g = (num & 0x0000FF) + amount;
            if (g > 255) g = 255;
            else if (g < 0) g = 0;
            
            return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
        }
        
        // 初始化游戏
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
